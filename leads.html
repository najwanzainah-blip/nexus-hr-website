<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الطلبات الواردة — Nexus HR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Cairo', sans-serif; background: #0b1220; color: #eef2f7; direction: rtl; min-height: 100vh; }

  .wrap { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

  /* شاشة الدخول */
  .login-box { max-width: 380px; margin: 100px auto; background: #121b2e; border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 32px; }
  .login-box h1 { font-size: 18px; font-weight: 800; margin-bottom: 20px; text-align: center; }
  .lp-input { background: #0b1220; border: 1.5px solid rgba(255,255,255,.12); border-radius: 10px; padding: 12px 14px; color: #eef2f7; font-family: 'Cairo', sans-serif; font-size: 13.5px; outline: none; width: 100%; margin-bottom: 12px; }
  .lp-input:focus { border-color: #16a34a; }
  .btn { background: #16a34a; color: #fff; padding: 12px; border-radius: 10px; font-weight: 800; font-size: 14px; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; width: 100%; }
  .err { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.35); color: #fca5a5; padding: 10px 14px; border-radius: 9px; font-size: 12.5px; margin-bottom: 12px; display: none; }

  /* شاشة الطلبات */
  #appScreen { display: none; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .top-bar h1 { font-size: 20px; font-weight: 800; }
  .logout-btn { background: transparent; border: 1px solid rgba(255,255,255,.18); color: #eef2f7; padding: 8px 16px; border-radius: 9px; font-family: 'Cairo', sans-serif; font-size: 12.5px; cursor: pointer; }

  .lead-card { background: #121b2e; border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; }
  .lead-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .lead-company { font-size: 15px; font-weight: 800; color: #f2b134; }
  .lead-date { font-size: 11.5px; color: #64748b; }
  .lead-row { font-size: 13px; color: #cbd5e1; margin-bottom: 4px; }
  .lead-row b { color: #eef2f7; font-weight: 700; }
  .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: rgba(22,163,74,.15); color: #6ee7a3; }
  .empty { text-align: center; color: #64748b; padding: 60px 20px; }
  .loading { text-align: center; color: #64748b; padding: 40px; }
</style>
</head>
<body>

  <div class="wrap">
    <!-- شاشة الدخول -->
    <div class="login-box" id="loginScreen">
      <h1>🔒 الطلبات الواردة — Nexus HR</h1>
      <div class="err" id="loginError"></div>
      <input type="email" id="email" placeholder="الإيميل" class="lp-input" />
      <input type="password" id="password" placeholder="كلمة المرور" class="lp-input" />
      <button class="btn" id="loginBtn">دخول</button>
    </div>

    <!-- شاشة الطلبات -->
    <div id="appScreen">
      <div class="top-bar">
        <h1>📋 الطلبات الواردة</h1>
        <button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
      </div>
      <div id="leadsContainer" class="loading">⏳ جاري التحميل...</div>
    </div>
  </div>

<script>
  const SUPABASE_URL = "https://opychhxxqnghovemelmu.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_AYY9pFsDBIGycM_VePSZ1g_9u22LYj6";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  const loginScreen = document.getElementById('loginScreen');
  const appScreen = document.getElementById('appScreen');
  const loginError = document.getElementById('loginError');

  async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session) {
      showApp();
    } else {
      loginScreen.style.display = 'block';
      appScreen.style.display = 'none';
    }
  }

  document.getElementById('loginBtn').addEventListener('click', async () => {
    loginError.style.display = 'none';
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      loginError.textContent = 'بيانات الدخول غير صحيحة';
      loginError.style.display = 'block';
      return;
    }
    showApp();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    location.reload();
  });

  async function showApp() {
    loginScreen.style.display = 'none';
    appScreen.style.display = 'block';
    loadLeads();
  }

  async function loadLeads() {
    const container = document.getElementById('leadsContainer');
    const { data, error } = await sb.from('sales_leads').select('*').order('created_at', { ascending: false });

    if (error) {
      container.innerHTML = '<div class="empty">تعذّر تحميل الطلبات</div>';
      return;
    }
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty">لا توجد طلبات بعد</div>';
      return;
    }

    container.innerHTML = data.map(lead => `
      <div class="lead-card">
        <div class="lead-top">
          <div class="lead-company">${escapeHtml(lead.company_name)}</div>
          <div class="lead-date">${new Date(lead.created_at).toLocaleString('ar-SA-u-nu-latn')}</div>
        </div>
        <div class="lead-row"><b>المسؤول:</b> ${escapeHtml(lead.contact_name)}</div>
        <div class="lead-row"><b>الجوال:</b> ${escapeHtml(lead.phone)}</div>
        ${lead.email ? `<div class="lead-row"><b>الإيميل:</b> ${escapeHtml(lead.email)}</div>` : ''}
        ${lead.employee_count ? `<div class="lead-row"><b>عدد الموظفين:</b> ${lead.employee_count}</div>` : ''}
        ${lead.message ? `<div class="lead-row"><b>ملاحظات:</b> ${escapeHtml(lead.message)}</div>` : ''}
        <div style="margin-top:8px"><span class="badge">${escapeHtml(lead.status || 'new')}</span></div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  checkSession();
</script>

</body>
</html>
